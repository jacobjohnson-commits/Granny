<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Granny's Weiner Escape | Silly Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Comic Sans MS', sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10;
        }
        #timer { font-size: 24px; color: #00ff00; }
        #silly-meter { font-size: 20px; color: #ff00ff; display: none; font-weight: bold; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: red; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        .death-msg { font-size: 60px; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #ff4500; color: white; border: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="timer">SURVIVED: 0s</div>
        <div id="status" style="color: #00fbff;">Find James Russ!</div>
        <div id="silly-meter">⚠️ SILLY TIME ACTIVE ⚠️</div>
    </div>

    <div id="overlay">
        <div class="death-msg" id="deathReason">CAUGHT</div>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // Gray background so you can see if lighting fails

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- BETTER LIGHTING (Should fix your black screen) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // Bright white light everywhere
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 100);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // --- ROOM ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshBasicMaterial({ color: 0x222222 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- ACTORS ---
        const playerGroup = new THREE.Group();
        const dogBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.5), new THREE.MeshBasicMaterial({ color: 0x8B4513 }));
        playerGroup.add(dogBody);
        playerGroup.position.y = 0.5;
        scene.add(playerGroup);

        const granny = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshBasicMaterial({ color: 0xff00ff }));
        granny.position.set(10, 1, 10);
        scene.add(granny);

        const jamesRuss = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 1), new THREE.MeshBasicMaterial({ color: 0x00fbff }));
        jamesRuss.position.set(-10, 1.5, -10);
        scene.add(jamesRuss);

        let liam = null;

        // --- STATE ---
        let seconds = 0;
        let isDead = false;
        let isSilly = false;
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Game Timer Logic
        setInterval(() => {
            if (isDead) return;
            seconds++;
            document.getElementById('timer').innerText = `SURVIVED: ${seconds}s`;

            // Silly Time Toggle every 30 seconds
            if (seconds % 30 === 0 && seconds !== 0) {
                triggerSillyTime();
            }

            if (seconds === 60) spawnLiam();
        }, 1000);

        function triggerSillyTime() {
            isSilly = true;
            document.getElementById('silly-meter').style.display = 'block';
            playerGroup.scale.set(3, 3, 3); // DOG GROWS GIANT
            
            setTimeout(() => {
                isSilly = false;
                document.getElementById('silly-meter').style.display = 'none';
                playerGroup.scale.set(1, 1, 1);
                scene.background = new THREE.Color(0x111111);
            }, 10000); // Lasts 10 seconds
        }

        function spawnLiam() {
            liam = new THREE.Mesh(new THREE.BoxGeometry(2, 6, 2), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            liam.position.set(0, 3, -15);
            scene.add(liam);
        }

        function animate() {
            if (isDead) return;
            requestAnimationFrame(animate);

            // Movement
            const moveSpeed = isSilly ? 0.3 : 0.15;
            if (keys['KeyW']) playerGroup.translateX(moveSpeed);
            if (keys['KeyS']) playerGroup.translateX(-moveSpeed);
            if (keys['KeyA']) playerGroup.rotation.y += 0.05;
            if (keys['KeyD']) playerGroup.rotation.y -= 0.05;

            // AI
            const gDir = new THREE.Vector3().subVectors(playerGroup.position, granny.position).normalize();
            granny.position.addScaledVector(gDir, 0.06);
            
            if (isSilly) {
                granny.rotation.y += 0.5; // Granny spins
                scene.background = new THREE.Color(Math.random() * 0xffffff); // Rainbow flashes
            }

            if (liam) {
                const lDir = new THREE.Vector3().subVectors(playerGroup.position, liam.position).normalize();
                liam.position.addScaledVector(lDir, 0.12);
            }

            // Camera (Third Person)
            const camOffset = new THREE.Vector3(-8, 6, 0).applyMatrix4(playerGroup.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(playerGroup.position);

            // Collisions
            if (playerGroup.position.distanceTo(granny.position) < 1.5) die("GRANNY GOT YOU");
            if (liam && playerGroup.position.distanceTo(liam.position) < 2) die("LIAM ELIMINATED YOU");

            renderer.render(scene, camera);
        }

        function die(msg) {
            isDead = true;
            document.getElementById('deathReason').innerText = msg;
            document.getElementById('overlay').style.display = 'flex';
        }

        animate();
    </script>
</body>
</html>
