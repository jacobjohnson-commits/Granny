<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Granny's Weiner Escape | Loxnezzz Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hud">
        <div id="timer">SURVIVAL: 0s</div>
        <div id="objective">OBJECTIVE: Find the Golden Bone to escape!</div>
    </div>

    <div id="overlay">
        <div class="death-msg" id="deathReason">CAUGHT</div>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <div id="winScreen">
        <h1 style="color: gold; font-size: 60px;">FREEDOM!</h1>
        <p>You escaped the house!</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
