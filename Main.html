<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loxnezzz Games | MAXIMUM SILLY</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Comic Sans MS', cursive; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10;
        }
        #timer { font-size: 30px; color: #ff00ff; animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 255, 0.5); color: white; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        button { padding: 20px; font-size: 25px; cursor: pointer; background: lime; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="timer">SILLY SURVIVAL: 0s</div>
        <div style="color: yellow;">WARNING: MAXIMUM SILLINESS DETECTED</div>
    </div>

    <div id="overlay">
        <h1 style="font-size: 80px;">GRANNY GOT SILLY!</h1>
        <button onclick="location.reload()">RE-SILLY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE HOUSE OF SILLY ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- SILLY MODELS ---
        const playerGroup = new THREE.Group();
        // The "Extra Long" Weiner Dog
        const dog = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.4, 0.4), new THREE.MeshBasicMaterial({ color: 0x8B4513 }));
        playerGroup.add(dog);
        playerGroup.position.y = 0.5;
        scene.add(playerGroup);

        const granny = new THREE.Mesh(new THREE.SphereGeometry(1, 10, 10), new THREE.MeshBasicMaterial({ color: 0xff00ff }));
        granny.position.set(12, 1, 12);
        scene.add(granny);

        const jamesRuss = new THREE.Mesh(new THREE.BoxGeometry(1.5, 4, 1.5), new THREE.MeshBasicMaterial({ color: 0x00fbff }));
        jamesRuss.position.set(-10, 2, -10);
        scene.add(jamesRuss);

        let liam = null;
        let seconds = 0;
        let isDead = false;
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        setInterval(() => {
            if (isDead) return;
            seconds++;
            document.getElementById('timer').innerText = `SILLY SURVIVAL: ${seconds}s`;
            if (seconds === 60) {
                liam = new THREE.Mesh(new THREE.BoxGeometry(3, 10, 3), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                liam.position.set(0, 5, -20);
                scene.add(liam);
            }
        }, 1000);

        function animate() {
            if (isDead) return;
            requestAnimationFrame(animate);

            // Rainbow Background
            scene.background = new THREE.Color(`hsl(${(Date.now() / 10) % 360}, 100%, 20%)`);

            // Wobble Movement
            const moveSpeed = 0.2;
            if (keys['KeyW']) {
                playerGroup.translateX(moveSpeed);
                playerGroup.position.y = 0.5 + Math.sin(Date.now() / 100) * 0.2; // Bounces while walking
            }
            if (keys['KeyS']) playerGroup.translateX(-moveSpeed);
            if (keys['KeyA']) playerGroup.rotation.y += 0.1;
            if (keys['KeyD']) playerGroup.rotation.y -= 0.1;

            // Silly Granny Logic
            const gDir = new THREE.Vector3().subVectors(playerGroup.position, granny.position).normalize();
            granny.position.addScaledVector(gDir, 0.08);
            granny.rotation.x += 0.2; // Granny rolls like a ball
            granny.scale.setScalar(1 + Math.sin(Date.now() / 200) * 0.5); // Granny pulses

            // Liam Logic
            if (liam) {
                const lDir = new THREE.Vector3().subVectors(playerGroup.position, liam.position).normalize();
                liam.position.addScaledVector(lDir, 0.15);
                liam.rotation.z += 0.1; 
            }

            // James Russ Spin
            jamesRuss.rotation.y += 0.1;

            // Camera
            const camOffset = new THREE.Vector3(-10, 8, 0).applyMatrix4(playerGroup.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(playerGroup.position);

            // Collisions
            if (playerGroup.position.distanceTo(granny.position) < 2) die();
            if (liam && playerGroup.position.distanceTo(liam.position) < 3) die();

            renderer.render(scene, camera);
        }

        function die() {
            isDead = true;
            document.getElementById('overlay').style.display = 'flex';
        }

        animate();
    </script>
</body>
</html>
