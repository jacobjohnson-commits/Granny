<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Evil Granny: Weiner Escape | High-Def Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="timer">SURVIVED: 0s</div>
        <div id="counter">BONES COLLECTED: 0/5</div>
        <div id="silly-warning">⚠️ SILLY TIME ACTIVE: THE ESCAPE IS OPEN! ⚠️</div>
    </div>

    <div id="overlay" class="screen">
        <h1 class="death-text">GRANNY CAUGHT YOU</h1>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <div id="winScreen" class="screen">
        <h1 class="win-text">YOU ESCAPED!</h1>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
